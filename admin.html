<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>פאנל מנהל מערכת</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: Arial, sans-serif; }
    h1 { color: #cb3837; text-align: center; margin-top: 20px; }
    table { width: 90%; margin: 30px auto; border-collapse: collapse; background-color: #1e293b; color: white; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px; text-align: center; border: 1px solid #334155; }
    th { background-color: #454545; color: #85a94e; }
    tr:hover { background-color: #334155; }
    
    /* עיצוב כפתורי הפעולות */
    .btn-action { padding: 6px 12px; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; margin: 2px; }
    .btn-role { background-color: #eab308; color: #000; }
    .btn-role:hover { background-color: #ca8a04; }
    .btn-reset { background-color: #3b82f6; }
    .btn-reset:hover { background-color: #2563eb; }
    .btn-delete { background-color: #cb3837; }
    .btn-delete:hover { background-color: #b91c1c; }
    
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .badge-admin { background-color: #cb3837; color: white; }
    .badge-user { background-color: #10b981; color: white; }
    
    .alert-note { background: #7c2d12; border: 1px solid #ea580c; padding: 10px; border-radius: 4px; width: 85%; margin: 10px auto; font-size: 13px; text-align: right; color: white; }
    #loadingScreen { text-align: center; font-size: 20px; font-weight: bold; margin-top: 100px; color: white; }
  </style>
</head>
<body>

  <div class="navbar">
    <h2>⚙️ פאנל מנהל מערכת סודי</h2>
    <div class="nav-links">
      <button class="theme-btn" id="themeToggle">🌓</button>
      <a href="welcome.html" class="btn" style="color:white; text-decoration:none;">חזרה ללובי</a>
    </div>
  </div>

  <div id="loadingScreen">מבצע אימות הרשאות מנהל... ⏳</div>

  <div id="adminContent" style="display: none;">
    <h1>ניהול משתמשי המערכת</h1>
    
    <div class="alert-note">
      ⚠️ <strong>אבטחת מערכת:</strong> חל איסור על מנהל למחוק את עצמו או לשנות את תפקיד הניהול של החשבון שלו.
    </div>

    <table class="card">
      <thead>
        <tr>
          <th>שם משתמש</th>
          <th>אימייל</th>
          <th>תפקיד במערכת</th>
          <th>פעולות ניהול (3 מצבים)</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="4">טוען משתמשים...</td></tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD7Rn-xp2jzy4jZy_tVIWHc1aMzIr6J7a8",
      authDomain: "wolfo-8d591.firebaseapp.com",
      projectId: "wolfo-8d591",
      storageBucket: "wolfo-8d591.firebasestorage.app",
      messagingSenderId: "568048252668",
      appId: "1:568048252668:web:8d1aa4ca3a37bd324e4979"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentLoggedInUID = "";

    // ניהול ערכת נושא (Theme) מהקוד המקורי שלך
    if (localStorage.getItem("theme") === "light") { document.body.classList.add("light-mode"); }
    const themeToggle = document.getElementById("themeToggle");
    themeToggle.addEventListener("click", () => {
      document.body.classList.toggle("light-mode");
      localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
    });

    // מאזין אימות משתמש וחסימת גישה למי שאינו אדמין
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentLoggedInUID = user.uid;
        try {
          const docSnap = await getDoc(doc(db, "users", user.uid));
          const isAdmin = (docSnap.exists() && docSnap.data().role === "admin") || user.email.toLowerCase() === "danielwo2010@gmail.com";
          
          if (isAdmin) {
            document.getElementById("loadingScreen").style.display = "none";
            document.getElementById("adminContent").style.display = "block";
            loadUsers();
          } else {
            alert("גישה חסומה! אינך מנהל מערכת.");
            window.location.href = "welcome.html";
          }
        } catch (error) {
          console.error("Error verifying admin status:", error);
          if (user.email.toLowerCase() === "danielwo2010@gmail.com") {
            document.getElementById("loadingScreen").style.display = "none";
            document.getElementById("adminContent").style.display = "block";
            loadUsers();
          } else {
            window.location.href = "welcome.html";
          }
        }
      } else { 
        window.location.href = "index.html"; 
      }
    });

    // טעינת הטבלה מתוך ה-Collection "users"
    async function loadUsers() {
      const tbody = document.getElementById("usersTableBody"); 
      tbody.innerHTML = ""; 
      
      try {
        const querySnapshot = await getDocs(collection(db, "users"));
        querySnapshot.forEach((userDoc) => {
          const data = userDoc.data();
          const userId = userDoc.id;
          const isSelf = (userId === currentLoggedInUID);
          const currentRole = data.role || 'user';

          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${data.username || 'ללא'} ${isSelf ? '<strong>(אתה)</strong>' : ''}</td>
            <td>${data.email}</td>
            <td>
              <span class="badge ${currentRole === 'admin' ? 'badge-admin' : 'badge-user'}">
                ${currentRole === 'admin' ? 'מנהל ⚙️' : 'משתמש רגיל 👤'}
              </span>
            </td>
            <td>
              <button class="btn-action btn-role" ${isSelf ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''} 
                      onclick="toggleUserRole('${userId}', '${currentRole}')">
                ${currentRole === 'admin' ? 'הורד למשתמש' : 'הפוך למנהל 👑'}
              </button>
              
              <button class="btn-action btn-reset" onclick="sendResetEmail('${data.email}')">
                איפוס סיסמה 🔒
              </button>
              
              <button class="btn-action btn-delete" ${isSelf ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''} 
                      onclick="deleteUser('${userId}', '${data.username || 'ללא'}')">
                מחק משתמש 🗑️
              </button>
            </td>
          `;
          tbody.appendChild(row);
        });
      } catch (error) {
        console.error("Error loading users:", error);
        tbody.innerHTML = "<tr><td colspan='4'>שגיאה בטעינת הנתונים.</td></tr>";
      }
    }

    // פונקציה 1: שינוי תפקיד המשתמש ב-Firestore (role: admin / user)
    async function toggleUserRole(id, currentRole) {
      if (id === currentLoggedInUID) return;
      const nextRole = currentRole === 'admin' ? 'user' : 'admin';
      if (!confirm(`האם אתה בטוח שברצונך לשנות את תפקיד המשתמש ל-${nextRole === 'admin' ? 'מנהל' : 'משתמש רגיל'}?`)) return;

      try {
        await updateDoc(doc(db, "users", id), { role: nextRole });
        alert("התפקיד עודכן בהצלחה בהתאם למסד הנתונים!");
        loadUsers();
      } catch (error) {
        alert("שגיאה בעדכון התפקיד: " + error.message);
      }
    }

    // פונקציה 2: שליחת מייל אוטומטי לאיפוס סיסמה
    function sendResetEmail(email) {
      if (!confirm(`האם לשלוח קישור רשמי לאיפוס סיסמה לכתובת: ${email}?`)) return;
      
      sendPasswordResetEmail(auth, email)
        .then(() => {
          alert(`מייל לאיפוס סיסמה נשלח בהצלחה אל: ${email}`);
        })
        .catch((error) => {
          alert("שגיאה בשליחת המייל: " + error.message);
        });
    }

    // פונקציה 3: מחיקת משתמש מה-Database
    async function deleteUser(id, username) {
      if (id === currentLoggedInUID) return;
      if (confirm(`האם אתה בטוח שברצונך למחוק את "${username}" ממאגר הנתונים?`)) {
        try {
          await deleteDoc(doc(db, "users", id));
          alert("המשתמש נמחק בהצלחה!");
          loadUsers();
        } catch (error) {
          alert("שגיאה במחיקה: " + error.message);
        }
      }
    }

    // חשיפת הפונקציות ל-HTML
    window.toggleUserRole = toggleUserRole;
    window.sendResetEmail = sendResetEmail;
    window.deleteUser = deleteUser;
  </script>
</body>
</html>
