<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>התחברות - Wolfo Chess</title>
  <style>
    /* עיצוב כללי מובנה שלא תלוי בקובץ חיצוני */
    body { font-family: Arial, sans-serif; background-color: #1e293b; color: #ffffff; padding-top: 50px; text-align: center; }
    .card { background: #0f172a; border: 1px solid #334155; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .login-container { width: 350px; margin: 0 auto; }
    .input-group { margin-bottom: 20px; text-align: right; }
    .input-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8; }
    .input-group input { width: 100%; font-size: 16px; padding: 8px; border-radius: 4px; border: 1px solid #334155; background-color: #1e293b; color: white; }
    .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; display: inline-block; text-decoration: none; }
    .btn-login { width: 100%; background-color: #85a94e; color: white; }
    .btn-login:hover { background-color: #6a883e; }
    .btn-guest { width: 100%; background-color: #475569; color: white; }
    .btn-guest:hover { background-color: #334155; }
    .link-register { display: inline-block; margin-top: 15px; color: #3b82f6; text-decoration: none; font-weight: bold; }
    .link-register:hover { text-decoration: underline; }

    /* מיקום העין בצד שמאל של תיבת הסיסמה */
    .password-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
    .password-wrapper input { width: 100%; padding-left: 40px; box-sizing: border-box; font-size: 16px; text-align: left; }
    .toggle-password { position: absolute; left: 10px; background: none; border: none; cursor: pointer; font-size: 18px; z-index: 10; padding: 0; margin: 0; color: white; }
  </style>
</head>
<body>

  <div class="login-container card">
    <h2>👋 ברוכים הבאים ל-Wolfo Chess</h2>
    <form id="loginForm">
      <div class="input-group">
        <label>אימייל:</label>
        <input type="email" id="email" required placeholder="your@email.com">
      </div>
      <div class="input-group">
        <label>סיסמה:</label>
        <div class="password-wrapper">
          <input type="password" id="password" required>
          <button type="button" class="toggle-password" id="toggleLoginPassword">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-login">התחבר למערכת 🔓</button>
      <button type="button" class="btn btn-guest" onclick="enterAsGuest()">כניסה כאורח 👤</button>
    </form>
    <a href="register.html" class="link-register">משתמש חדש? הירשם כאן</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD7Rn-xp2jzy4jZy_tVIWHc1aMzIr6J7a8",
      authDomain: "wolfo-8d591.firebaseapp.com",
      projectId: "wolfo-8d591",
      storageBucket: "wolfo-8d591.firebasestorage.app",
      messagingSenderId: "568048252668",
      appId: "1:568048252668:web:8d1aa4ca3a37bd324e4979"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user && localStorage.getItem("guestMode") !== "true") {
        window.location.href = "welcome.html";
      }
    });

    // לוגיקה של העין בדף ההתחברות
    const loginPasswordInput = document.getElementById("password");
    const toggleLoginPasswordBtn = document.getElementById("toggleLoginPassword");

    toggleLoginPasswordBtn.addEventListener("click", () => {
      if (loginPasswordInput.type === "password") {
        loginPasswordInput.type = "text";
        toggleLoginPasswordBtn.textContent = "🙈";
      } else {
        loginPasswordInput.type = "password";
        toggleLoginPasswordBtn.textContent = "👁️";
      }
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = loginPasswordInput.value;

      try {
        localStorage.removeItem("guestMode");
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "welcome.html";
      } catch (error) {
        alert("שגיאה בהתחברות: אימייל או סיסמה שגויים.");
      }
    });

    function enterAsGuest() {
      localStorage.setItem("guestMode", "true");
      window.location.href = "welcome.html";
    }
    window.enterAsGuest = enterAsGuest;
  </script>
</body>
</html>
