<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>הרשמה - Wolfo Chess</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #1e293b; color: #ffffff; padding-top: 50px; text-align: center; }
    .card { background: #0f172a; border: 1px solid #334155; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .register-container { width: 350px; margin: 0 auto; }
    .input-group { margin-bottom: 20px; text-align: right; }
    .input-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8; }
    .input-group input { width: 100%; font-size: 16px; padding: 8px; border-radius: 4px; border: 1px solid #334155; background-color: #1e293b; color: white; }
    .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; display: inline-block; }
    .btn-register { background-color: #85a94e; color: white; }
    .btn-register:hover { background-color: #6a883e; }
    .link-login { display: inline-block; margin-top: 15px; color: #3b82f6; text-decoration: none; font-weight: bold; }
    .link-login:hover { text-decoration: underline; }

    /* מיקום העין בצד שמאל של תיבת הסיסמה */
    .password-wrapper { position: relative; display: flex; align-items: center; width: 100%; }
    .password-wrapper input { width: 100%; padding-left: 40px; box-sizing: border-box; font-size: 16px; text-align: left; }
    .toggle-password { position: absolute; left: 10px; background: none; border: none; cursor: pointer; font-size: 18px; z-index: 10; padding: 0; margin: 0; color: white; }
  </style>
</head>
<body>

  <div class="register-container card">
    <h2>📝 יצירת משתמש חדש</h2>
    <form id="registerForm">
      <div class="input-group">
        <label>שם משתמש:</label>
        <input type="text" id="username" required style="text-align: right;">
      </div>
      <div class="input-group">
        <label>אימייל:</label>
        <input type="email" id="email" required placeholder="your@email.com">
      </div>
      <div class="input-group">
        <label>סיסמה:</label>
        <div class="password-wrapper">
          <input type="password" id="registerPassword" required>
          <button type="button" class="toggle-password" id="toggleRegisterPassword">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-register">הרשם עכשיו ✨</button>
    </form>
    <a href="index.html" class="link-login">כבר רשום? התחבר כאן</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD7Rn-xp2jzy4jZy_tVIWHc1aMzIr6J7a8",
      authDomain: "wolfo-8d591.firebaseapp.com",
      projectId: "wolfo-8d591",
      storageBucket: "wolfo-8d591.firebasestorage.app",
      messagingSenderId: "568048252668",
      appId: "1:568048252668:web:8d1aa4ca3a37bd324e4979"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const registerPasswordInput = document.getElementById("registerPassword");
    const toggleRegisterPasswordBtn = document.getElementById("toggleRegisterPassword");

    // פונקציית בדיקת אנגלית לשם המשתמש (דרישת חובה במחוון המורה)
    function isEnglish(text) {
      return /^[A-Za-z]+$/.test(text);
    }

    // פונקציית בדיקת חוזק סיסמה (אות גדולה אחת ולפחות 6 תווים - דרישת המורה)
    function isValidPassword(password) {
      return /[A-Z]/.test(password) && password.length >= 6;
    }

    toggleRegisterPasswordBtn.addEventListener("click", () => {
      if (registerPasswordInput.type === "password") {
        registerPasswordInput.type = "text";
        toggleRegisterPasswordBtn.textContent = "🙈";
      } else {
        registerPasswordInput.type = "password";
        toggleRegisterPasswordBtn.textContent = "👁️";
      }
    });

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = registerPasswordInput.value;

      // 1. בדיקת תקינות שם משתמש באנגלית בלבד
      if (!isEnglish(username)) {
        alert("שם המשתמש חייב להכיל אותיות באנגלית בלבד (A-Z, a-z)!");
        return; // עוצר את הרישום ולא ממשיך ל-Firebase
      }

      // 2. בדיקת תקינות סיסמה (לפחות 6 תווים ואות גדולה אחת)
      if (!isValidPassword(password)) {
        alert("הסיסמה חייבת להיות באורך של 6 תווים לפחות ולהכיל לפחות אות גדולה אחת באנגלית (A-Z)!");
        return; // עוצר את הרישום ולא ממשיך ל-Firebase
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
          username: username,
          email: email,
          role: "user"
        });

        await signOut(auth);
        alert("ההרשמה בוצעה בהצלחה!");
        window.location.href = "index.html";
      } catch (error) {
        alert("שגיאה בהרשמה: " + error.message);
      }
    });
  </script>
</body>
</html>
