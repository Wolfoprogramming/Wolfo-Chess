<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>הרשמה - Wolfo Chess</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding-top: 50px; }
    .register-container { width: 350px; margin: 0 auto; padding: 30px; }
    .input-group { margin-bottom: 20px; text-align: right; }
    .input-group label { display: block; margin-bottom: 5px; font-size: 14px; }
    .input-group input { width: 100%; font-size: 16px; text-align: left; }
    .password-wrapper { position: relative; display: flex; align-items: center; }
    .toggle-password { position: absolute; left: 10px; background: none; border: none; cursor: pointer; font-size: 18px; }
    .btn-register { width: 100%; margin-top: 10px; }
    .link-login { display: inline-block; margin-top: 15px; color: var(--accent-color); text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

  <div class="register-container card">
    <h2>📝 יצירת משתמש חדש</h2>
    <form id="registerForm">
      <div class="input-group">
        <label>שם משתמש:</label>
        <input type="text" id="username" required style="text-align: right;">
      </div>
      <div class="input-group">
        <label>אימייל:</label>
        <input type="email" id="email" required placeholder="your@email.com">
      </div>
      <div class="input-group">
        <label>סיסמה:</label>
        <div class="password-wrapper">
          <input type="password" id="registerPassword" required>
          <button type="button" class="toggle-password" id="toggleRegisterPassword">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-register">הרשם עכשיו ✨</button>
    </form>
    <a href="index.html" class="link-login">כבר רשום? התחבר כאן</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD7Rn-xp2jzy4jZy_tVIWHc1aMzIr6J7a8",
      authDomain: "wolfo-8d591.firebaseapp.com",
      projectId: "wolfo-8d591",
      storageBucket: "wolfo-8d591.firebasestorage.app",
      messagingSenderId: "568048252668",
      appId: "1:568048252668:web:8d1aa4ca3a37bd324e4979"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    if (localStorage.getItem("theme") === "light") { document.body.classList.add("light-mode"); }

    const registerPasswordInput = document.getElementById("registerPassword");
    const toggleRegisterPasswordBtn = document.getElementById("toggleRegisterPassword");

    // תיקון מלא של כפתור העין בדף ההרשמה
    toggleRegisterPasswordBtn.addEventListener("click", () => {
      if (registerPasswordInput.type === "password") {
        registerPasswordInput.type = "text";
        toggleRegisterPasswordBtn.textContent = "🔒";
      } else {
        registerPasswordInput.type = "password";
        toggleRegisterPasswordBtn.textContent = "👁️";
      }
    });

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = registerPasswordInput.value;

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
          username: username,
          email: email,
          role: "user"
        });

        await signOut(auth);
        alert("ההרשמה בוצעה בהצלחה!");
        window.location.href = "index.html";
      } catch (error) {
        alert("שגיאה בהרשמה: " + error.message);
      }
    });
  </script>
</body>
</html>
