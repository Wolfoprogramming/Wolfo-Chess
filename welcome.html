<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>לובי שחמט - Wolfo Chess</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .container { padding: 30px; }
    .menu { display: flex; justify-content: center; gap: 20px; margin-top: 40px; flex-wrap: wrap; }
    .card { padding: 30px; width: 220px; cursor: pointer; transition: 0.3s; }
    .card:hover { transform: translateY(-5px); border-color: var(--accent-color) !important; }
    .card h3 { margin-top: 0; }
    .admin-box { margin-top: 40px; display: none; }
  </style>
</head>
<body>

  <div class="navbar">
    <h2>👑 WOLFO CHESS</h2>
    <div class="nav-links">
      <button class="theme-btn" id="themeToggle">🌓</button>
      <a href="about.html" style="font-size: 16px;">ℹ️ אודות</a>
      <button id="logoutBtn" class="theme-btn" style="font-size: 16px;">התנתק 🚪</button>
    </div>
  </div>

  <div class="container">
    <h1 id="welcomeText">ברוך הבא, טוען נתונים... 👋</h1>
    <p class="subtitle">בחר לאן תרצה להמשיך מכאן:</p>

    <div class="menu">
      <div class="card" onclick="window.location.href='game.html'">
        <h3>⚔️ זירה מקומית</h3>
        <p>שחק נגד חבר על אותו מסך, כולל שעונים וחוקים מלאים.</p>
      </div>
      <div class="card" onclick="window.location.href='learn.html'">
        <h3>📚 מדריכי לימוד</h3>
        <p>למד איך כל כלי זז על הלוח בצורה אינטראקטיבית וויזואלית.</p>
      </div>
      <div class="card" onclick="window.location.href='quiz.html'">
        <h3>❓ חידון הידע</h3>
        <p>בחן את רמת השחמט שלך וענה על שאלות חוקים מאתגרות.</p>
      </div>
    </div>

    <div class="admin-box" id="adminBox">
      <hr style="border-color: var(--border-color); margin: 40px 0;">
      <button class="btn" style="background-color: #cb3837;" onclick="window.location.href='admin.html'">⚙️ כניסה לפאנל ניהול מערכת סודי</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyD7Rn-xp2jzy4jZy_tVIWHc1aMzIr6J7a8",
      authDomain: "wolfo-8d591.firebaseapp.com",
      projectId: "wolfo-8d591",
      storageBucket: "wolfo-8d591.firebasestorage.app",
      messagingSenderId: "568048252668",
      appId: "1:568048252668:web:8d1aa4ca3a37bd324e4979"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const themeToggle = document.getElementById("themeToggle");
    if (localStorage.getItem("theme") === "light") { document.body.classList.add("light-mode"); }
    themeToggle.addEventListener("click", () => {
      document.body.classList.toggle("light-mode");
      localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
    });

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const docSnap = await getDoc(doc(db, "users", user.uid));
        if (docSnap.exists()) {
          const userData = docSnap.data();
          document.getElementById("welcomeText").innerText = "ברוך הבא, " + userData.username + "! 👋";
          
          // בדיקה מעודכנת לפי המייל החדש שלך
          if (userData.role === "admin" || user.email.toLowerCase() === "danielwo2010@gmail.com") {
            document.getElementById("adminBox").style.display = "block";
          }
        }
      } else {
        window.location.href = "index.html";
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      signOut(auth).then(() => { window.location.href = "index.html"; });
    });
  </script>
</body>
</html>
